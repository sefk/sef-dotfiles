onboarding = false

[keys]
prefix = "ctrl+a"
previous_workspace = "shift+left"    # tmux S-Left
next_workspace     = "shift+right"   # tmux S-Right
split_vertical     = "prefix+|"      # side-by-side split on | (was prefix+v)

# prefix+arrows mirror the default prefix+{hjkl} pane focus. herdr actions take a
# single key each, so the arrows are added as custom commands hitting the pane CLI
# rather than as a second value on focus_pane_*.
[[keys.command]]
key = "prefix+left"
type = "shell"
command = "herdr pane focus --direction left --current"

[[keys.command]]
key = "prefix+right"
type = "shell"
command = "herdr pane focus --direction right --current"

[[keys.command]]
key = "prefix+up"
type = "shell"
command = "herdr pane focus --direction up --current"

[[keys.command]]
key = "prefix+down"
type = "shell"
command = "herdr pane focus --direction down --current"

[theme]
name = "terminal"                    # inherits the outer terminal (ghostty) palette
auto_switch = false

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
hide_tab_bar_when_single_tab = true  # workspaces are mostly single-tab

[ui.toast]
delivery = "system"                  # macOS desktop notification when herdr isn't focused

[session]
resume_agents_on_restore = true      # resume agent conversations after a server restart

[experimental]
pane_history = true                  # scrollback survives full server restarts
