# Credit for getting me started here to Joe Blaylock (jrbl@jrbl.com)
# A few from https://mutelight.org/practical-tmux

# I prefer control-a to control-b, easier to type
set -g prefix C-a

# double press is cycle through -- match prefix char above
bind ^a select-pane -t :.+

# C-a a sends literal C-a to the app (e.g. claude code)
bind a send-prefix

# slim session-colored status bar (styled lower down); toggle with `C-a Space`
set -g status on

# pass focus events through to the underlying shell
set -g focus-events on

# set xterm window status
set-option -g set-titles on
set-option -g set-titles-string '[#S] #(whoami)@#H #{pane_current_path}'
# set-option -g set-titles-string '#H:#S.#I.#P #W #T' # window number,program name,active(or not)

# Rename session
bind r command-prompt -I "#S" "rename-session '%%'"

# Start Window Numbering at One
set -g base-index 1

# unbind ^@
# bind ^@ next-window

# play nicely with mouse
# http://tangledhelix.com/blog/2012/07/16/tmux-and-mouse-mode/
set -g mouse on

# Shift-PageUp/PageDown scroll through scrollback (plain PageUp/PageDown pass through to apps)
unbind -n PageUp
bind -n S-PageUp copy-mode -eu
bind -T copy-mode S-PageUp send-keys -X page-up
bind -T copy-mode S-PageDown send-keys -X page-down
bind -T copy-mode-vi S-PageUp send-keys -X page-up
bind -T copy-mode-vi S-PageDown send-keys -X page-down

# Some places have a version of tmux that supports down-pane, in which case
# # the select-pane trick doesn't work.  And other places have a version with
# # select-pane but not down-pane.  So... yeah.
unbind Tab
bind Tab select-pane -t :.+
# bind Tab down-pane

# Shift-arrows to cycle sessions without prefix
bind -n S-Right switch-client -n
bind -n S-Left switch-client -p

# Make split behaviors reasonable
# unbind '"'
# unbind %
bind '-' split-window -c "#{pane_current_path}"
bind '_' split-window -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# need binding for next-layout
unbind *
bind * next-layout

# toggle status bar
bind Space set-option -g status

if-shell "uname | grep -q Darwin" "source-file ~/.tmux-osx.conf"

bind R source-file ~/.tmux.conf \; display-message "Config reloaded.."

# if you run attach and there isn't a session, creates for you
# http://unix.stackexchange.com/questions/103898/how-to-start-tmux-with-attach-if-a-session-exists
# Only create if no sessions exist (avoids spawning on config reload)
if-shell "! tmux has-session 2>/dev/null" "new-session -n '#{host_short}'"

# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"

# true color support
set -as terminal-overrides ",*:Tc"

# clipboard passthrough via OSC 52 (ghostty supports this)
set -g set-clipboard on
# tmux breaking ghostty's URL clickability
set -g allow-passthrough on

# Double-line pane borders colored per session (the name set with `C-a r`).
# ~/bin/tmux-border-color hashes #{session_name} -> @bordercolor (bright),
# @bordercolor_dim, and @bordertext, stored per session; the active pane
# border is bold+bright, inactive borders are the muted shade. (Pane borders
# only show with 2+ panes — the status bar below is the always-on marker.)
set -g pane-border-lines double
set -g @bordercolor colour245       # fallbacks until the helper runs
set -g @bordercolor_dim colour238
set -g @bordertext black
set -g pane-border-style "fg=#{@bordercolor_dim}"
set -g pane-active-border-style "fg=#{@bordercolor},bold"

# Leave pane contents alone — the border is the only pane differentiator.
set -g window-style default
set -g window-active-style default

# Slim status bar in the session's color — an always-visible session marker
# even with a single pane (turned on above; `C-a Space` toggles).
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#{@bordercolor},fg=#{@bordertext}"
set -g status-left "#[bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[bold] %H:%M #[default]"
set -g status-right-length 20
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "reverse,bold"

# Re-render every session's color from its @wincolor on rename / new session,
# and once when this config is (re)loaded. resolve is idempotent and honors the
# stored @wincolor (rename only changes the color of name-derived sessions), so
# this never fights the statusline or a manual `color` override.
set-hook -g after-rename-session 'run-shell "~/bin/tmux-border-color --all"'
set-hook -g session-created      'run-shell "~/bin/tmux-border-color --all"'
run-shell "~/bin/tmux-border-color --all"

# SSH agent forwarding: use stable symlink so old sessions find the new socket
set-environment -g SSH_AUTH_SOCK "$HOME/.ssh/auth_sock"

# undercurl support (for neovim diagnostics/spell-check)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# extended key encoding so nvim sees Ctrl+Shift+letter, Ctrl+,, Shift+Enter, etc.
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features ',*:extkeys'


